[settings]
python.uv_venv_auto = "create|source"
lockfile = true

[tools]
uv = "0.11.28"

[tasks.deps]
description = "Install dependencies into a local virtual environment"
run = "uv sync"

[tasks.setup]
description = "Update bikeshed"
depends = ["deps"]
run = "uv run -m bikeshed update"

[tasks.build]
description = "Build the formatted HTML specification"
depends = ["deps"]
run = "uv run -m bikeshed spec"

[tasks.serve]
description = "Serve the rendered document locally at http://localhost:8000"
depends = ["deps"]
run = "uv run -m bikeshed serve"
